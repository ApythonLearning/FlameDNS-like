project:
  output_dir: results_axisymmetric_h2o2

gas:
  mechanism: h2o2.yaml
  temperature_K: 298.0
  pressure_Pa: 101325.0
  oxidizer: O2
  fuel: H2

transport:
  unity_lewis: false
  cantera_transport_model: mixture-averaged

gravity:
  enabled: false

free_flame:
  width_m: 0.025
  loglevel: 0

mesh:
  r_max_m: 0.006
  z_min_m: -0.006
  z_max_m: 0.006
  nr: 321
  nz: 641
  min_points_per_flame_thickness: 10

ignition:
  initial_radius_m: 0.0015
  hot_kernel_radius_m: 0.00075
  hot_kernel_temperature_K: 1800.0

time_history:
  synthetic_until_solver_ready: true
  t_end_s: 0.0035
  n_steps: 701
  cfl_limit: 0.5

postprocess:
  fit:
    min_radius_m: 0.0020
    max_kappa_1_s: 5000.0

cases:
  - name: H2O2_lean10_axisym_spherical
    h2_volume_fraction: 0.10
